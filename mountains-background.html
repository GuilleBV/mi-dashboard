<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mountains + Particles Background</title>
<style>
/* ============================================================
 * Mountains + drifting particles background.
 *
 * Self-contained. Layer stack (back → front):
 *   .aurora     radial mint glow
 *   .mountains  two SVG silhouette ridges (far + near)
 *   .mist       soft horizontal band above the ridges
 *   .particles  drifting mint pinpoints (generated in JS)
 *
 * Drop the markup + CSS into any page. Pure CSS animation +
 * a tiny JS loop to spawn the particles. No dependencies.
 * ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

.scene {
  --bg: #04060a;
  --mint: #6ee7b7;
  --mint-soft: #a7f3d0;

  position: relative;
  height: 100vh;
  min-height: 720px;
  width: 100%;
  overflow: hidden;
  isolation: isolate;
  background: var(--bg);
  font-family: ui-sans-serif, system-ui, sans-serif;
}

/* ----- Aurora: radial mint glow ----- */
.aurora {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(60% 50% at 50% 48%,
      rgba(110, 231, 183, 0.22) 0%,
      rgba(110, 231, 183, 0.08) 30%,
      rgba(110, 231, 183, 0) 65%),
    radial-gradient(28% 22% at 50% 50%,
      rgba(255, 226, 181, 0.10) 0%,
      rgba(255, 226, 181, 0) 70%),
    radial-gradient(120% 80% at 50% 100%,
      rgba(14, 38, 30, 0.85) 0%,
      rgba(4, 6, 10, 1) 70%);
}

/* ----- Mountains: two silhouette ridges ----- */
.mountains {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 1;
  height: 38vh;
  min-height: 220px;
  pointer-events: none;
}
.mountains svg { width: 100%; height: 100%; display: block; }

/* ----- Mist: soft band above the ridges ----- */
.mist {
  position: absolute;
  left: 0; right: 0;
  bottom: 28vh;
  height: 22vh;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(to top,
    rgba(4, 6, 10, 0) 0%,
    rgba(110, 231, 183, 0.06) 40%,
    rgba(4, 6, 10, 0) 100%);
  filter: blur(8px);
}

/* ----- Particles: drifting mint pinpoints ----- */
.particles { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
.particles span {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: rgba(233, 239, 233, 0.55);
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(167, 243, 208, 0.35);
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); opacity: 0; }
  8%   { opacity: 0.7; }
  92%  { opacity: 0.5; }
  100% { transform: translate3d(var(--dx, 12px), var(--dy, -100vh), 0); opacity: 0; }
}

/* Optional centered caption — delete if you only want the background. */
.caption {
  position: absolute;
  inset: 0;
  z-index: 6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  pointer-events: none;
}
.caption h1 {
  font-family: 'Times New Roman', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(34px, 6vw, 64px);
  color: #e9efe9;
  letter-spacing: -0.01em;
}
.caption h1 em { color: var(--mint); }
.caption p {
  margin-top: 14px;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(233, 239, 233, 0.5);
}

@media (prefers-reduced-motion: reduce) {
  .particles span { animation: none; }
}
</style>
</head>
<body>

  <div class="scene">
    <!-- Aurora glow -->
    <div class="aurora" aria-hidden="true"></div>

    <!-- Mountains horizon -->
    <div class="mountains" aria-hidden="true">
      <svg viewBox="0 0 1600 420" preserveAspectRatio="none">
        <defs>
          <linearGradient id="mt-far" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0d1a17" stop-opacity="0" />
            <stop offset="55%"  stop-color="#0d1a17" stop-opacity=".55" />
            <stop offset="100%" stop-color="#0d1a17" stop-opacity=".95" />
          </linearGradient>
          <linearGradient id="mt-near" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#050a09" stop-opacity=".4" />
            <stop offset="60%"  stop-color="#050a09" stop-opacity=".95" />
            <stop offset="100%" stop-color="#050a09" stop-opacity="1" />
          </linearGradient>
        </defs>
        <!-- Far ridge -->
        <path
          d="M0,300 L120,230 L210,260 L320,180 L430,220 L560,150 L680,210 L820,170 L960,220 L1100,180 L1240,240 L1380,200 L1500,250 L1600,220 L1600,420 L0,420 Z"
          fill="url(#mt-far)"
        />
        <!-- Near ridge -->
        <path
          d="M0,360 L100,320 L220,340 L340,290 L460,330 L590,300 L720,340 L860,310 L1000,350 L1140,310 L1280,355 L1420,320 L1540,360 L1600,340 L1600,420 L0,420 Z"
          fill="url(#mt-near)"
        />
      </svg>
    </div>

    <!-- Mist band -->
    <div class="mist" aria-hidden="true"></div>

    <!-- Drifting particles (filled by JS) -->
    <div class="particles" id="particles" aria-hidden="true"></div>

    <!-- Optional caption — remove this block for a pure background -->
    <div class="caption">
      <h1>Your <em>peak</em> today</h1>
      <p>mountains · mist · particles</p>
    </div>
  </div>

<script>
/* Spawn drifting pinpoints. Each gets a random position, speed, size and
   a horizontal sway via the --dx / --dy custom props the @keyframes reads.
   Negative delays mean the field looks "already running" on first paint. */
(function () {
  const root = document.getElementById('particles');
  if (!root) return;
  const N = window.innerWidth < 640 ? 10 : 18;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('span');
    const dur = 18 + Math.random() * 22;
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (60 + Math.random() * 40) + 'vh';
    const size = 1 + Math.random() * 1.2;
    s.style.width = s.style.height = size + 'px';
    s.style.animationDuration = dur + 's';
    s.style.animationDelay = (-Math.random() * dur) + 's';
    s.style.setProperty('--dx', (Math.random() * 30 - 15) + 'px');
    s.style.setProperty('--dy', (-(60 + Math.random() * 50)) + 'vh');
    root.appendChild(s);
  }
})();
</script>
</body>
</html>
