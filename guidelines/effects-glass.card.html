<!-- @dsCard group="Effects" viewport="700x190" name="Glass & surface gradient" subtitle="Backdrop blur sheets and the top-lit bento gradient" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--bg-base); }
  .stage {
    position: relative; height: 190px;
    background:
      radial-gradient(420px 180px at 18% 0%, rgba(59,130,246,0.22), transparent 70%),
      radial-gradient(360px 200px at 90% 120%, rgba(0,240,255,0.16), transparent 70%),
      var(--bg-base);
    display:flex; align-items:center; gap:18px; padding: 0 22px;
  }
  .card { width:180px; height:118px; border-radius:var(--radius-lg); border:1px solid var(--border-subtle); box-shadow:var(--inner-top-hairline), var(--shadow-md); display:flex; align-items:flex-end; padding:12px; }
  .glass { background:var(--bg-glass); backdrop-filter:var(--blur-glass); -webkit-backdrop-filter:var(--blur-glass); }
  .grad { background:var(--gradient-card); }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); }
</style>
</head>
<body>
  <div class="stage">
    <div class="card grad"><span class="lbl">--gradient-card<br>top-lit bento</span></div>
    <div class="card glass"><span class="lbl">--bg-glass<br>blur(12px) saturate</span></div>
  </div>
</body>
</html>
