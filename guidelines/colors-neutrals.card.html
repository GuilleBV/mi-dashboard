<!-- @dsCard group="Colors" viewport="700x180" name="Canvas neutrals" subtitle="Zinc ramp — base, surfaces, hairlines, text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg-base); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 78px; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .name { margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--zinc-950)"></div><div class="name">zinc-950</div><div class="hex">#09090b</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-900)"></div><div class="name">zinc-900</div><div class="hex">#18181b</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-800)"></div><div class="name">zinc-800</div><div class="hex">#27272a</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-700)"></div><div class="name">zinc-700</div><div class="hex">#3f3f46</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-500)"></div><div class="name">zinc-500</div><div class="hex">#71717a</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-400)"></div><div class="name">zinc-400</div><div class="hex">#a1a1aa</div></div>
    <div class="sw"><div class="chip" style="background:var(--zinc-100)"></div><div class="name">zinc-100</div><div class="hex">#f4f4f5</div></div>
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="name">white</div><div class="hex">#ffffff</div></div>
  </div>
</body>
</html>
