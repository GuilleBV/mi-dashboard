<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base rhythm — gaps & padding tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--accent); border-radius:3px; width:100%; }
  .box { display:flex; align-items:flex-end; height:64px; }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><div class="box"><span class="bar" style="height:4px; width:18px"></span></div><span class="lbl">1·4</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:8px; width:18px"></span></div><span class="lbl">2·8</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:12px; width:18px"></span></div><span class="lbl">3·12</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:16px; width:18px"></span></div><span class="lbl">4·16</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:20px; width:18px"></span></div><span class="lbl">5·20</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:24px; width:18px"></span></div><span class="lbl">6·24</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:32px; width:18px"></span></div><span class="lbl">8·32</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:40px; width:18px"></span></div><span class="lbl">10·40</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:48px; width:18px"></span></div><span class="lbl">12·48</span></div>
  <div class="col"><div class="box"><span class="bar" style="height:64px; width:18px"></span></div><span class="lbl">16·64</span></div>
</body>
</html>
