<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="System-first stack — hero figures, section & card titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display:flex; flex-direction:column; gap:16px; }
  .specimen { display:flex; align-items:baseline; gap:16px; }
  .meta { width:150px; flex-shrink:0; font-family: var(--font-mono); font-size:10px; color: var(--text-faint); line-height:1.5; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta">display · 800<br>clamp→128px · 0.8lh</div>
    <div style="font-size:64px; font-weight:800; letter-spacing:-0.02em; line-height:0.8; background:var(--gradient-text-electric); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">128</div>
  </div>
  <div class="specimen">
    <div class="meta">text-3xl · 800<br>hero figure · 44px</div>
    <div style="font-size:44px; font-weight:800; letter-spacing:-0.02em; color:var(--text-primary)">€48.250</div>
  </div>
  <div class="specimen">
    <div class="meta">text-xl · 600<br>section title · 26px</div>
    <div style="font-size:26px; font-weight:600; letter-spacing:-0.01em; color:var(--text-primary)">Buenos días, Mateo</div>
  </div>
  <div class="specimen">
    <div class="meta">text-lg · 600<br>card title · 20px</div>
    <div style="font-size:20px; font-weight:600; letter-spacing:-0.01em; color:var(--text-primary)">Foco diario</div>
  </div>
</body>
</html>
