<!-- @dsCard group="Components" viewport="700x300" name="BentoCard" subtitle="The base surface — header, glows, glass" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-base); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  svg { width:18px; height:18px; }
  p { color:var(--text-secondary); font-size:14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { BentoCard, Badge, IconButton } = window.MiDashboardDesignSystem_1a61a0;
    const More = () => <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>;
    function Demo() {
      return (
        <div className="grid">
          <BentoCard eyebrow="Hoy" title="Foco diario" action={<IconButton size="sm" ariaLabel="más"><More/></IconButton>}>
            <p>Entrena piernas. Recuperación al 72%.</p>
          </BentoCard>
          <BentoCard title="Recordatorio" glow="blue">
            <p>Toma creatina antes de entrenar.</p>
          </BentoCard>
          <BentoCard title="Próximo pago" glow="danger">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{margin:0}}>Spotify</p><Badge tone="danger" solid>2 días</Badge>
            </div>
          </BentoCard>
          <BentoCard title="Glass" glass glow="green">
            <p>Sheet flotante con desenfoque.</p>
          </BentoCard>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
